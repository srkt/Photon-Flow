<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Column Mapper</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--panel:#ffffff;--card:#f8f9fb;--card2:#eef0f4;
  --border:#d0d6e0;--border2:#b8c0cc;
  --accent:#1a6ef5;--accent2:#1558cc;--accentdim:#e8f0fe;
  --green:#0a7c4e;--greendim:#e6f4ee;
  --orange:#b85c00;--orangedim:#fff3e0;
  --red:#c0152a;--reddim:#fdeaec;
  --purple:#6b21a8;--purpledim:#f3e8ff;
  --yellow:#854d0e;--yellowdim:#fefce8;
  --text:#1a2035;--text2:#4a5568;--text3:#9aa5b4;
  --mono:'Courier New',monospace;
  --sans:'Segoe UI',Tahoma,sans-serif;
}
body{background:var(--bg);font-family:var(--sans);color:var(--text);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--card2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
select option{background:#fff;color:var(--text)}

/* ── HEADER ── */
#hdr{background:var(–panel);border-bottom:1px solid var(–border);padding:12px 16px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
#logo{font-family:var(–mono);font-size:12px;color:var(–accent);letter-spacing:3px;font-weight:700;text-transform:uppercase}
#filebadge{font-family:var(–mono);font-size:10px;color:var(–text2);background:var(–card);border:1px solid var(–border);border-radius:4px;padding:3px 10px;display:none}
.steps{display:flex;align-items:center;gap:6px;margin-left:auto}
.step{font-family:var(–mono);font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(–border);color:var(–text3);transition:all .2s;letter-spacing:.5px}
.step.active{background:var(–accentdim);color:var(–accent);border-color:var(–accent)}
.sep{width:16px;height:1px;background:var(–border)}

/* ── LAYOUT ── */
#main{max-width:100%;margin:0;padding:20px 16px}

/* ── UPLOAD ── */
#dropzone{border:2px dashed var(–border2);border-radius:12px;padding:72px 32px;text-align:center;cursor:pointer;transition:all .25s;background:var(–panel);max-width:640px;margin:72px auto}
#dropzone:hover,#dropzone.over{border-color:var(–accent);background:var(–accentdim)}
#dropzone .dicon{font-size:36px;margin-bottom:12px;opacity:.8}
#dropzone .dlbl{font-family:var(–mono);color:var(–accent);font-size:13px;margin-bottom:4px;letter-spacing:1px}
#dropzone .dsub{color:var(–text2);font-size:11px}

/* ── BUTTONS ── */
.btn{border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(–sans);transition:all .15s;white-space:nowrap}
.btn-accent{background:var(–accent);color:#000}.btn-accent:hover{background:var(–accent2)}
.btn-accent:disabled{background:var(–border);color:var(–text3);cursor:not-allowed}
.btn-green{background:var(–green);color:#000;font-weight:700}.btn-green:hover{filter:brightness(1.1)}
.btn-green:disabled{background:var(–border);color:var(–text3);cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(–border);color:var(–text2)}.btn-ghost:hover{border-color:var(–accent);color:var(–accent)}
.btn-red{background:var(–reddim);border:1px solid var(–red)44;color:var(–red)}.btn-red:hover{background:var(–red);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:4px}
.btn-icon{padding:4px 8px;font-size:14px;border-radius:4px;line-height:1}

/* ── TOP BAR ── */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.ptitle{font-family:var(–mono);font-size:16px;font-weight:700;color:var(–text);letter-spacing:.5px}
.psub{color:var(–text2);font-size:12px;margin-top:3px}
.btnrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── SECTION CARD ── */
.scard{background:var(–panel);border:1px solid var(–border);border-radius:10px;margin-bottom:12px}
.scard-hdr{padding:10px 16px;border-bottom:1px solid var(–border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.scard-hdr .slbl{font-family:var(–mono);font-size:10px;color:var(–accent);letter-spacing:1.5px;font-weight:700;flex:1}
.scard-hdr .stoggle{color:var(–text2);font-size:12px;transition:transform .2s}
.scard-hdr.collapsed .stoggle{transform:rotate(-90deg)}
.scard-body{padding:14px 16px}
.scard-body.hidden{display:none}

/* ── BULK TOOLBAR ── */
#bulkBar{background:var(–accentdim);border:1px solid var(–accent)44;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
#bulkBar.show{display:flex}
#bulkBar .blbl{font-family:var(–mono);font-size:10px;color:var(–accent);letter-spacing:1px;white-space:nowrap}
.bulkinput{background:var(–card);border:1px solid var(–border2);color:var(–text);border-radius:5px;padding:5px 9px;font-family:var(–mono);font-size:11px;outline:none;width:120px}
.bulkinput:focus{border-color:var(–accent)}

/* ── COLUMN TABLE ── */
#colTable{border-radius:8px;overflow:hidden;border:1px solid var(–border);width:100%}
.cthead{display:grid;grid-template-columns:32px 28px 30px 1.4fr 1.4fr 2.4fr 120px 110px;gap:0;padding:8px 10px;border-bottom:1px solid var(–border);background:var(–card2)}
.cthead span{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center}
#colBody{max-height:calc(100vh - 340px);overflow-y:auto}
.crow{display:grid;grid-template-columns:32px 28px 30px 1.4fr 1.4fr 2.4fr 120px 110px;gap:0;padding:7px 10px;align-items:center;border-bottom:1px solid var(–border)22;transition:background .1s;cursor:default}
.crow:last-child{border-bottom:none}
.crow:nth-child(even){background:var(–card)66}
.crow.dropped{opacity:.4;background:var(–reddim)!important}
.crow.formula-row{background:var(–purpledim)44}
.crow.dragging{opacity:.4}
.crow.drag-over{border-top:2px solid var(–accent)}
.drag-handle{color:var(–text3);cursor:grab;font-size:14px;text-align:center;user-select:none;padding:2px}
.drag-handle:hover{color:var(–accent)}
.crow input[type=checkbox]{accent-color:var(–accent);cursor:pointer;width:13px;height:13px}
.rownum{font-family:var(–mono);font-size:9px;color:var(–text3);text-align:center}
.src-col{font-family:var(–mono);font-size:11px;color:var(–text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px}
.src-col .formula-badge{font-size:9px;background:var(–purpledim);color:var(–purple);border:1px solid var(–purple)44;border-radius:3px;padding:1px 5px;margin-left:4px}
.ci{background:#fff;border:1px solid var(–border);color:var(–text);border-radius:5px;padding:4px 7px;font-family:var(–mono);font-size:11px;outline:none;width:100%}
.ci:focus{border-color:var(–accent);background:#fff}
.ci:disabled{opacity:.35;cursor:not-allowed;background:var(–card2)}
.txsel{background:#fff;color:var(–text);border:1px solid var(–border);border-radius:5px;padding:4px 6px;font-family:var(–mono);font-size:10px;cursor:pointer;outline:none;width:100%}
.txbadge{border-radius:3px;padding:1px 6px;font-size:9px;font-family:var(–mono);white-space:nowrap;border:1px solid transparent;display:inline-block}
.orderbtn{background:transparent;border:none;color:var(–text3);cursor:pointer;padding:1px 4px;font-size:12px;line-height:1;border-radius:3px}
.orderbtn:hover{color:var(–accent);background:var(–accentdim)}
.dropbtn{background:transparent;border:1px solid var(–border);color:var(–text2);border-radius:4px;padding:3px 8px;font-size:10px;font-family:var(–mono);cursor:pointer;transition:all .15s;white-space:nowrap}
.dropbtn:hover{background:var(–reddim);border-color:var(–red);color:var(–red)}
.crow.dropped .dropbtn{background:var(–greendim);border-color:var(–green);color:var(–green)}

/* ── FORMULA BUILDER ── */
#formulaPanel{background:var(–panel);border:1px solid var(–purple)44;border-radius:10px;padding:16px;margin-bottom:12px}
#formulaPanel h3{font-family:var(–mono);font-size:11px;color:var(–purple);letter-spacing:1px;margin-bottom:12px}
.fprow{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap}
.fplbl{font-family:var(–mono);font-size:10px;color:var(–text2);margin-bottom:4px;letter-spacing:.5px}
.fpinput{background:#fff;border:1px solid var(–border2);color:var(–text);border-radius:6px;padding:7px 10px;font-family:var(–mono);font-size:12px;outline:none;width:100%}
.fpinput:focus{border-color:var(–accent)}
.formula-expr{font-size:13px;min-height:36px}
.fp-hint{font-size:10px;color:var(–text2);margin-top:6px;line-height:1.6}
.fp-hint code{background:var(–card2);padding:1px 5px;border-radius:3px;color:var(–purple);font-family:var(–mono)}
.colpill{display:inline-block;background:var(–accentdim);color:var(–accent);border:1px solid var(–accent)44;border-radius:3px;padding:1px 7px;font-size:10px;font-family:var(–mono);cursor:pointer;margin:2px;white-space:nowrap;transition:all .1s}
.colpill:hover{background:var(–accent);color:#000}
.formula-error{color:var(–red);font-size:11px;font-family:var(–mono);margin-top:4px}
.formula-ok{color:var(–green);font-size:11px;font-family:var(–mono);margin-top:4px}

/* ── ROW FILTER ── */
.rfrow{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.rflbl{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px}
input[type=radio]{accent-color:var(–accent)}
.sminput{background:#fff;border:1px solid var(–border2);color:var(–text);border-radius:5px;padding:5px 9px;font-family:var(–mono);font-size:11px;outline:none}
.sminput:focus{border-color:var(–accent)}

/* ── PREVIEW TABLE ── */
.pvwrap{overflow-x:auto;border-radius:8px;border:1px solid var(–border);width:100%}
.pvtbl{width:100%;border-collapse:collapse;font-family:var(–mono);font-size:11px}
.pvtbl th{padding:8px 12px;text-align:left;color:var(–accent);border-bottom:1px solid var(–border);background:var(–card2);white-space:nowrap;font-weight:600;letter-spacing:.3px}
.pvtbl td{padding:6px 12px;border-bottom:1px solid var(–border)22;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(–text)}
.pvtbl tr:nth-child(even) td{background:var(–card)66}

/* ── DONE ── */
.donewrap{max-width:600px;margin:48px auto;text-align:center}
.statgrid{display:grid;grid-template-columns:repeat(3,200px);gap:10px;margin-bottom:24px;justify-content:center}
.statcard{background:var(–panel);border:1px solid var(–border);border-radius:8px;padding:14px 10px}
.statv{font-family:var(–mono);font-size:22px;font-weight:700}
.statl{color:var(–text2);font-size:10px;margin-top:3px;letter-spacing:.5px}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(240,242,245,.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(–border2);border-top-color:var(–accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlayMsg{font-family:var(–mono);color:var(–accent);font-size:12px;letter-spacing:1px}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
#modal.show{display:flex}
.modalbox{background:#fff;border:1px solid var(–border2);border-radius:12px;padding:20px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modaltitle{font-family:var(–mono);font-size:12px;color:var(–accent);letter-spacing:1px;margin-bottom:14px}
.modalbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── MISC ── */
.tag{display:inline-block;font-size:9px;font-family:var(–mono);padding:1px 6px;border-radius:3px;border:1px solid transparent;vertical-align:middle}
</style>

</head>

<script>
// ═══════════════════════════════════════════════════
// XL ENGINE — zero external deps
// ═══════════════════════════════════════════════════
const XL=(function(){
  const CRCT=new Uint32Array(256);
  for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);CRCT[i]=c;}
  function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CRCT[(c^b[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
  async function unzip(ab){
    const u8=new Uint8Array(ab),view=new DataView(ab),files={};
    let eocd=-1;
    for(let i=u8.length-22;i>=Math.max(0,u8.length-65558);i--){if(u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06){eocd=i;break;}}
    if(eocd<0)return files;
    const cdOff=view.getUint32(eocd+16,true),cdCount=view.getUint16(eocd+8,true),TD2=new TextDecoder('utf-8');
    let pos=cdOff;
    for(let e=0;e<cdCount;e++){
      if(view.getUint32(pos,true)!==0x02014B50)break;
      const fnL=view.getUint16(pos+28,true),exL=view.getUint16(pos+30,true),cmL=view.getUint16(pos+32,true),lhO=view.getUint32(pos+42,true);
      const fname=TD2.decode(u8.slice(pos+46,pos+46+fnL));
      pos+=46+fnL+exL+cmL;
      const lfnL=view.getUint16(lhO+26,true),lexL=view.getUint16(lhO+28,true),method=view.getUint16(lhO+8,true),cSz=view.getUint32(lhO+18,true);
      const dStart=lhO+30+lfnL+lexL,cData=u8.slice(dStart,dStart+cSz);
      if(method===0){files[fname]=cData;}
      else if(method===8){
        try{
          const ds=new DecompressionStream('deflate-raw'),w=ds.writable.getWriter(),r=ds.readable.getReader();
          w.write(cData);w.close();
          const ch=[];let tot=0;
          while(true){const{done,value}=await r.read();if(done)break;ch.push(value);tot+=value.length;}
          const out=new Uint8Array(tot);let off=0;for(const c of ch){out.set(c,off);off+=c.length;}
          files[fname]=out;
        }catch(e){files[fname]=new Uint8Array(0);}
      }
    }
    return files;
  }
  const TDec=new TextDecoder('utf-8',{fatal:false});
  const xs=u8=>TDec.decode(u8);
  const ux=s=>s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(+n));
  function parseSST(x){const ss=[],re=/<si\b[^>]*>([\s\S]*?)<\/si>/g;let m;while((m=re.exec(x))!==null){const ts=[],tr=/<t(?:[^>]*)>([\s\S]*?)<\/t>/g;let tm;while((tm=tr.exec(m[1]))!==null)ts.push(ux(tm[1]));ss.push(ts.join(''));}return ss;}
  function colNum(c){let n=0;for(let i=0;i<c.length;i++)n=n*26+(c.charCodeAt(i)-64);return n;}
  function parseSheet(x,ss){
    const rowRe=/<row\b[^>]*>([\s\S]*?)<\/row>/g,all=[];let rm;
    while((rm=rowRe.exec(x))!==null){
      const cells={},cr=/<c\b([^>]*)>([\s\S]*?)<\/c>/g;let cm;
      while((cm=cr.exec(rm[1]))!==null){
        const at=cm[1],inn=cm[2],rM=at.match(/\br="([A-Z]+\d+)"/);if(!rM)continue;
        const col=rM[1].replace(/\d+/,''),t=(at.match(/\bt="(\w+)"/)??[])[1]??'';
        const v=ux((inn.match(/<v>([\s\S]*?)<\/v>/)??['',''])[1]);
        let val=v;

    // Convert Excel date serial headers (e.g. 44927 → "2023-01-01")

  async function readXLSX(ab){const files=await unzip(ab);const ss=files['xl/sharedStrings.xml']?parseSST(xs(files['xl/sharedStrings.xml'])):[];const sf=files['xl/worksheets/sheet1.xml'];if(!sf)throw new Error('No worksheet found');return parseSheet(xs(sf),ss);}
  function toCSV(rows){if(!rows.length)return'';const h=Object.keys(rows[0]),q=v=>`"${String(v??'').replace(/"/g,'""')}"`;return[h.map(q).join(','),...rows.map(r=>h.map(k=>q(r[k])).join(','))].join('\n');}
  function toXLSX(rows){

    const cl=n=>{let l='';while(n>0){l=String.fromCharCode(65+(n-1)%26)+l;n=Math.floor((n-1)/26);}return l;};

    sh+=`</sheetData></worksheet>`;
    const ssX=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${ssA.length}" uniqueCount="${ssA.length}">${ssA.map(s=>`<si><t xml:space="preserve">${ex(s)}</t></si>`).join('')}</sst>`;
    const wbX=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Mapped" sheetId="1" r:id="rId1"/></sheets></workbook>`;
    const wbR=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>`;
    const dR=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;

    const cdSz=cdP.reduce((s,p)=>s+p.length,0),eocd=new Uint8Array(22);const ev=new DataView(eocd.buffer);ev.setUint32(0,0x06054B50,true);ev.setUint16(8,cdP.length,true);ev.setUint16(10,cdP.length,true);ev.setUint32(12,cdSz,true);ev.setUint32(16,offset,true);

})();

// ═══════════════════════════════════════════════════
// FORMULA ENGINE
// ═══════════════════════════════════════════════════
function evalFormula(expr, row, headers) {
  // Replace [ColName] with row values
  let e = expr.replace(/\[([^\]]+)\]/g, (_, col) => {
    const v = row[col];
    if(v === undefined) return '""';
    const n = parseFloat(v);
    return isNaN(n) ? `"${String(v).replace(/"/g,'\\"')}"` : String(n);
  });

  // Build safe eval context
  const fns = {
    LEFT:   (s,n)=>String(s).slice(0,n),
    RIGHT:  (s,n)=>String(s).slice(-n),
    MID:    (s,st,n)=>String(s).slice(st-1,st-1+n),
    LEN:    s=>String(s).length,
    TRIM:   s=>String(s).trim(),
    UPPER:  s=>String(s).toUpperCase(),
    LOWER:  s=>String(s).toLowerCase(),
    PROPER: s=>String(s).replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase()),
    SUBSTITUTE:(s,old,nw)=>String(s).split(old).join(nw),
    REPLACE:(s,st,n,nw)=>String(s).slice(0,st-1)+nw+String(s).slice(st-1+n),
    ROUND:  (n,d)=>Math.round(n*Math.pow(10,d))/Math.pow(10,d),
    FLOOR:  (n,s)=>Math.floor(n/s)*s,
    CEILING:(n,s)=>Math.ceil(n/s)*s,
    ABS:    n=>Math.abs(n),
    MOD:    (n,d)=>n%d,
    TEXT:   (v,fmt)=>{ if(fmt==='0')return String(Math.round(v)); if(fmt==='0.00')return Number(v).toFixed(2); return String(v); },
    IF:     (cond,t,f)=>cond?t:f,
    IIF:    (cond,t,f)=>cond?t:f,
    ISNULL: v=>v===null||v===undefined||v==='',
    COALESCE:(a,b)=>( a===null||a===undefined||a==='')?b:a,
    CONCAT: (...args)=>args.join(''),
    NOW:    ()=>new Date().toISOString().slice(0,10),
    TODAY:  ()=>new Date().toISOString().slice(0,10),
  };

  // Replace & with + for string concat (Excel style)
  e = e.replace(/&/g, '+');

  try {
    const fn = new Function(...Object.keys(fns), `"use strict"; return (${e});`);
    const result = fn(...Object.values(fns));
    return result === null || result === undefined ? '' : String(result);
  } catch(err) {
    return '#ERR:' + err.message;
  }
}

function validateFormula(expr, headers) {
  if(!expr.trim()) return {ok:false, msg:'Empty formula'};
  const testRow = {};
  headers.forEach(h => { testRow[h] = '1'; });
  const result = evalFormula(expr, testRow, headers);
  if(String(result).startsWith('#ERR:')) return {ok:false, msg:result};
  return {ok:true, msg:'✓ Valid — sample result: ' + result};
}

// ═══════════════════════════════════════════════════
// TRANSFORMS
// ═══════════════════════════════════════════════════
const TRANSFORMS=[
  {v:'none',l:'No change',c:'#3a4a6a'},
  {v:'trim',l:'Trim spaces',c:'#00e5a0'},
  {v:'date_iso',l:'→ Date YYYY-MM-DD',c:'#00d4ff'},
  {v:'date_us',l:'→ Date MM/DD/YYYY',c:'#00d4ff'},
  {v:'uppercase',l:'→ UPPERCASE',c:'#ffaa00'},
  {v:'lowercase',l:'→ lowercase',c:'#ffaa00'},
  {v:'titlecase',l:'→ Title Case',c:'#ffaa00'},
  {v:'number',l:'→ Number',c:'#b388ff'},
  {v:'remove_special',l:'Remove special chars',c:'#ff4466'},
  {v:'snake_case',l:'→ snake_case',c:'#00e5a0'},
];

function toTitleCase(s){return s.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase());}
function toSnakeCase(s){return s.trim().toLowerCase().replace(/[\s\-\.\/\\]+/g,'_').replace(/[^a-z0-9_]/g,'').replace(/^_+|_+$/g,'');}
function parseDateVal(v){if(!v&&v!==0)return null;if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return isNaN(d.getTime())?null:d;}const d=new Date(v);return isNaN(d.getTime())?null:d;}
function applyTransform(val,type){
  const s=val===null||val===undefined?'':String(val);
  switch(type){
    case'trim':return s.trim();
    case'date_iso':{const d=parseDateVal(val);return d?d.toISOString().slice(0,10):s.trim();}
    case'date_us':{const d=parseDateVal(val);return d?`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`:s.trim();}
    case'uppercase':return s.trim().toUpperCase();
    case'lowercase':return s.trim().toLowerCase();
    case'titlecase':return toTitleCase(s.trim());
    case'number':{const n=parseFloat(s.replace(/[^0-9.\-]/g,''));return isNaN(n)?s:n;}
    case'remove_special':return s.replace(/[^a-zA-Z0-9\s\-_.,]/g,'').trim();
    case'snake_case':return toSnakeCase(s);
    default:return val;
  }
}

const dz=document.getElementById('dropzone'),fi=document.getElementById('fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');loadFile(e.dataTransfer.files[0]);});
fi.addEventListener('change',e=>loadFile(e.target.files[0]));

async function loadFile(file){
  if(!file)return;
  fileName=file.name;
  const ext=file.name.split('.').pop().toLowerCase();
  showOverlay('Reading file…');
  try{
    rawData = ext==='csv' ? XL.readCSV(await file.text()) : await XL.readXLSX(await file.arrayBuffer());
    if(!rawData.length){hideOverlay();alert('No data found.');return;}
    srcHeaders=Object.keys(rawData[0]);
    // Build colDefs
    colDefs=srcHeaders.map((h,i)=>({id:'c'+i,srcCol:h,outName:h,transform:'trim',dropped:false,type:'source'}));
    // populate filter col
    document.getElementById('filterCol').innerHTML=srcHeaders.map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('');
    document.getElementById('mapInfo').textContent=`${rawData.length.toLocaleString()} rows · ${srcHeaders.length} source columns`;
    const fb=document.getElementById('filebadge');fb.textContent=fileName;fb.style.display='inline-block';
    renderColTable();
    hideOverlay();
    showPage('map');
  }catch(err){hideOverlay();alert('Could not read file:\n'+err.message);console.error(err);}
}

// ═══════════════════════════════════════════════════
// COLUMN TABLE RENDER
// ═══════════════════════════════════════════════════
let dragSrcIdx=null;

function renderColTable(){
  const body=document.getElementById('colBody');
  body.innerHTML=colDefs.map((def,i)=>{
    const isDrop=def.dropped;
    const isFormula=def.type==='formula'||def.type==='const';
    const tx=TRANSFORMS.find(t=>t.v===def.transform)||TRANSFORMS[0];
    const opts=TRANSFORMS.map(t=>`<option value="${t.v}"${def.transform===t.v?' selected':''}>${t.l}</option>`).join('');
    const srcLabel=isFormula
      ? `<span style="color:var(--purple)">${esc(def.srcCol)}</span><span class="formula-badge">${def.type==='const'?'CONST':'FX'}</span>`
      : esc(def.srcCol);
    const typeBadge=def.type==='formula'?`<span class="tag" style="background:var(--purpledim);color:var(--purple);border-color:var(--purple)44">formula</span>`
      :def.type==='const'?`<span class="tag" style="background:var(--yellowdim);color:var(--yellow);border-color:var(--yellow)44">const</span>`
      :`<span class="txbadge" style="background:${tx.c}22;color:${tx.c};border-color:${tx.c}44">${tx.l}</span>`;
    return`<div class="crow${isDrop?' dropped':''}${isFormula?' formula-row':''}" id="crow${i}" draggable="true"
        ondragstart="dragStart(${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})" ondragleave="dragLeave(${i})">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span><input type="checkbox" class="rowcheck" data-idx="${i}" onchange="onCheckChange()" ${isDrop?'disabled':''}></span>
      <span class="rownum">${i+1}</span>
      <div class="src-col">${srcLabel}</div>
      <input class="ci" value="${esc(def.outName)}" ${isDrop?'disabled':''} oninput="colDefs[${i}].outName=this.value" title="Output column name"/>
      <div style="display:flex;align-items:center;gap:5px">
        ${isFormula
          ? `<input class="ci formula-expr" value="${esc(def.formula||'')}" ${isDrop?'disabled':''} oninput="colDefs[${i}].formula=this.value" style="font-size:11px" title="Formula expression"/>`
          : `<select class="txsel" onchange="colDefs[${i}].transform=this.value;renderColTable()" ${isDrop?'disabled':''}>${opts}</select>`
        }
      </div>
      <div>${typeBadge}</div>
      <div style="display:flex;gap:3px;align-items:center">
        <button class="orderbtn" onclick="moveRow(${i},-1)" title="Move up">↑</button>
        <button class="orderbtn" onclick="moveRow(${i},1)" title="Move down">↓</button>
        <button class="dropbtn" onclick="toggleDrop(${i})">${isDrop?'Restore':'Drop'}</button>
        ${isFormula?`<button class="orderbtn btn-red" onclick="removeRow(${i})" title="Delete" style="color:var(--red)">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
  updateBulkBar();
}

// Drag & drop reorder
function dragStart(i){dragSrcIdx=i;document.getElementById('crow'+i).classList.add('dragging');}
function dragOver(e,i){e.preventDefault();document.getElementById('crow'+i).classList.add('drag-over');}
function dragLeave(i){document.getElementById('crow'+i).classList.remove('drag-over');}
function dragDrop(e,i){
  e.preventDefault();
  document.getElementById('crow'+i).classList.remove('drag-over');
  if(dragSrcIdx===null||dragSrcIdx===i)return;
  const moved=colDefs.splice(dragSrcIdx,1)[0];
  colDefs.splice(i,0,moved);
  dragSrcIdx=null;
  renderColTable();
}

function moveRow(i,dir){
  const j=i+dir;if(j<0||j>=colDefs.length)return;
  [colDefs[i],colDefs[j]]=[colDefs[j],colDefs[i]];renderColTable();
}
function removeRow(i){colDefs.splice(i,1);renderColTable();}
function toggleDrop(i){colDefs[i].dropped=!colDefs[i].dropped;renderColTable();}

// Selection
function onCheckChange(){updateBulkBar();}
function toggleSelectAll(checked){
  document.querySelectorAll('.rowcheck').forEach(cb=>{if(!cb.disabled)cb.checked=checked;});
  updateBulkBar();
}
function getSelected(){return[...document.querySelectorAll('.rowcheck:checked')].map(cb=>parseInt(cb.dataset.idx));}
function clearSelection(){document.querySelectorAll('.rowcheck').forEach(cb=>cb.checked=false);document.getElementById('selAll').checked=false;updateBulkBar();}
function updateBulkBar(){
  const sel=getSelected();
  const bb=document.getElementById('bulkBar');
  bb.classList.toggle('show',sel.length>0);
  document.getElementById('bulkCount').textContent=sel.length+' selected';
}
function bulkDropSelected(){getSelected().forEach(i=>{colDefs[i].dropped=true;});clearSelection();renderColTable();}

function closeModal(){document.getElementById('modal').classList.remove('show');}

function toggleFormulaType(v){
  document.getElementById('fxFormulaBlock').style.display=v==='formula'?'block':'none';
  document.getElementById('fxConstBlock').style.display=v==='const'?'block':'none';
  document.getElementById('fxSplitBlock').style.display=v==='split'?'block':'none';
}

function insertColRef(col, targetId){
  const inp=document.getElementById(targetId);
  if(!inp)return;
  const pos=inp.selectionStart||inp.value.length;
  inp.value=inp.value.slice(0,pos)+`[${col}]`+inp.value.slice(pos);
  inp.focus();inp.selectionStart=inp.selectionEnd=pos+col.length+2;
  if(targetId==='fxExpr') checkFormula();
}

function checkFormula(){
  const expr=document.getElementById('fxExpr')?.value||'';
  const st=document.getElementById('fxStatus');
  if(!st)return;
  if(!expr.trim()){st.textContent='';return;}
  const r=validateFormula(expr,srcHeaders);
  st.textContent=r.msg;
  st.style.color=r.ok?'var(--green)':'var(--red)';
}

// Modal actions
function applyBulkRename(){
  const find=document.getElementById('brFind').value;
  const replace=document.getElementById('brReplace').value;
  const prefix=document.getElementById('brPrefix').value;
  const suffix=document.getElementById('brSuffix').value;
  const scope=document.querySelector('input[name=brScope]:checked').value;
  const sel=getSelected();
  colDefs.forEach((def,i)=>{
    if(def.dropped)return;
    if(scope==='selected'&&!sel.includes(i))return;
    let n=def.outName;
    if(find) n=n.split(find).join(replace);
    if(prefix) n=prefix+n;
    if(suffix) n=n+suffix;
    def.outName=n;
  });
  closeModal();renderColTable();
}

function applyBulkTransform(){
  const t=document.getElementById('baTransform').value;
  getSelected().forEach(i=>{colDefs[i].transform=t;});
  closeModal();clearSelection();renderColTable();
}

function applyBulkPrefixSuffix(){
  const pre=document.getElementById('bpPrefix').value;
  const suf=document.getElementById('bpSuffix').value;
  getSelected().forEach(i=>{colDefs[i].outName=(pre||'')+colDefs[i].outName+(suf||'');});
  closeModal();clearSelection();renderColTable();
}

function applyFindReplace(){
  const find=document.getElementById('frFind').value;
  const replace=document.getElementById('frReplace').value;
  if(!find){closeModal();return;}
  colDefs.forEach(def=>{ def.outName=def.outName.split(find).join(replace); });
  closeModal();renderColTable();
}

function applyAddColumn(){
  const name=document.getElementById('fxName').value.trim();
  if(!name){alert('Please enter an output column name.');return;}
  const type=document.querySelector('input[name=fxType]:checked').value;
  let def;
  if(type==='formula'){
    const expr=document.getElementById('fxExpr').value.trim();
    if(!expr){alert('Please enter a formula.');return;}
    def={id:'fx'+Date.now(),srcCol:'='+expr,outName:name,transform:'none',dropped:false,type:'formula',formula:expr};
  } else if(type==='const'){
    const val=document.getElementById('fxConst').value;
    def={id:'cx'+Date.now(),srcCol:`"${val}"`,outName:name,transform:'none',dropped:false,type:'const',formula:`"${val.replace(/"/g,'\\"')}"`};
  } else {
    // split
    const col=document.getElementById('fxSplitCol').value;
    const delim=document.getElementById('fxSplitDelim').value||',';
    const part=parseInt(document.getElementById('fxSplitPart').value)||1;
    const actualDelim=delim.toLowerCase()==='space'?' ':delim;
    const expr=`(String([${col}]).split("${actualDelim.replace(/"/g,'\\"')}")[${part-1}]||"")`;
    def={id:'sx'+Date.now(),srcCol:`SPLIT([${col}],${part})`,outName:name,transform:'none',dropped:false,type:'formula',formula:expr};
  }
  colDefs.push(def);
  closeModal();renderColTable();
}

// ═══════════════════════════════════════════════════
// APPLY RULES
// ═══════════════════════════════════════════════════
function applyRules(data){
  const fc=document.getElementById('filterCol').value;
  const fv=document.getElementById('filterVal').value;
  const activeDefs=colDefs.filter(d=>!d.dropped);
  return data.filter(row=>{
    if(rowFilter==='nonempty'){
      return activeDefs.some(d=>d.type==='source'&&String(row[d.srcCol]??'').trim()!=='');
    }
    if(rowFilter==='custom'&&fc&&fv) return String(row[fc]??'').toLowerCase().includes(fv.toLowerCase());
    return true;
  }).map(row=>{
    const out={};
    activeDefs.forEach(def=>{
      let val;
      if(def.type==='formula'||def.type==='const'){
        val=evalFormula(def.formula,row,srcHeaders);
      } else {
        val=row[def.srcCol]??'';
        if(def.transform&&def.transform!=='none') val=applyTransform(val,def.transform);
      }
      out[def.outName]=val;
    });
    return out;
  });
}

// ═══════════════════════════════════════════════════
// PREVIEW & EXPORT
// ═══════════════════════════════════════════════════
function runPreview(){
  const sample=applyRules(rawData.slice(0,10));
  if(!sample.length){alert('No rows match the current filter.');return;}
  const ph=Object.keys(sample[0]);
  const activeCols=colDefs.filter(d=>!d.dropped).length;
  document.getElementById('previewInfo').textContent=
    `${ph.length} output columns · ${rawData.length.toLocaleString()} total rows`;
  document.getElementById('runBtn').textContent=`⬇ Export ${rawData.length.toLocaleString()} rows`;
  document.getElementById('pvTable').innerHTML=
    `<thead><tr>${ph.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
     <tbody>${sample.map(r=>`<tr>${ph.map(h=>`<td title="${esc(String(r[h]??''))}">${esc(String(r[h]??''))}</td>`).join('')}</tr>`).join('')}</tbody>`;
  showPage('preview');
}

function runFull(){
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='Exporting…';
  showOverlay('Applying mapping…');
  setTimeout(()=>{
    try{
      const cleaned=applyRules(rawData);
      const droppedCols=colDefs.filter(d=>d.dropped).length;
      const addedCols=colDefs.filter(d=>!d.dropped&&(d.type==='formula'||d.type==='const')).length;
      const base=fileName.replace(/\.[^.]+$/,'');
      dlBlob(new Blob([XL.toCSV(cleaned)],{type:'text/csv'}),base+'_mapped.csv');
      dlBlob(XL.toXLSX(cleaned),base+'_mapped.xlsx');
      document.getElementById('statGrid').innerHTML=[
        {l:'ROWS EXPORTED',v:cleaned.length.toLocaleString(),c:'var(--green)'},
        {l:'COLS DROPPED', v:droppedCols.toString(),          c:droppedCols?'var(--red)':'var(--text2)'},
        {l:'COLS ADDED',   v:addedCols.toString(),            c:addedCols?'var(--purple)':'var(--text2)'},
      ].map(s=>`<div class="statcard"><div class="statv" style="color:${s.c}">${s.v}</div><div class="statl">${s.l}</div></div>`).join('');
      hideOverlay();showPage('done');
    }catch(err){
      hideOverlay();btn.disabled=false;btn.textContent='⬇ Export all rows';
      alert('Export error:\n'+err.message);console.error(err);
    }
  },50);
}

let scriptMode = 'column'; // 'column' | 'row'

// ── Saved script library (localStorage) ────────────
function loadLibrary(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveLibrary(lib){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(lib)); }
  catch(e){ consolePrint('⚠ Could not save to localStorage: '+e.message); }
}
function refreshLibSelect(){
  const lib = loadLibrary();
  const sel = document.getElementById('scriptLibSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Load saved script —</option>';
  Object.keys(lib)
    .filter(k => lib[k].mode === scriptMode)
    .sort()
    .forEach(k => {
      const opt = document.createElement('option');
      opt.value = k;
      opt.textContent = k;
      sel.appendChild(opt);
    });
  sel.value = cur;
  sel.onchange = () => {
    const name = sel.value;
    if(!name) return;
    const lib2 = loadLibrary();
    if(lib2[name]) document.getElementById('scriptEditor').value = lib2[name].code;
  };
}

function saveScript(){
  const code = document.getElementById('scriptEditor').value.trim();
  if(!code){ consolePrint('Nothing to save.'); return; }
  const name = prompt('Save script as:', document.getElementById('scriptLibSelect').value || '');
  if(!name) return;
  const lib = loadLibrary();
  lib[name] = { mode: scriptMode, code, saved: new Date().toISOString() };
  saveLibrary(lib);
  refreshLibSelect();
  document.getElementById('scriptLibSelect').value = name;
  consolePrint('✓ Saved as "'+name+'"');
}

function deleteScript(){
  const name = document.getElementById('scriptLibSelect').value;
  if(!name){ consolePrint('No script selected.'); return; }
  if(!confirm('Delete "'+name+'"?')) return;
  const lib = loadLibrary();
  delete lib[name];
  saveLibrary(lib);
  refreshLibSelect();
  consolePrint('Deleted "'+name+'"');

// ── Test script against first 3 rows ───────────────
function testScript(){
  consoleClear();
  const code = document.getElementById('scriptEditor').value;
  if(!code.trim()){ consolePrint('Nothing to test.'); return; }
  consolePrint('▶ Running test on first 3 rows…');
  try {
    if(scriptMode === 'column'){
      // Deep copy colDefs for testing
      const testDefs = JSON.parse(JSON.stringify(colDefs));
      const fn = new Function('colDefs','srcHeaders','console2', '"use strict";\n'+code);
      const logs = [];
      fn(testDefs, srcHeaders, { log: (...a) => logs.push(a.join(' ')), warn: (...a) => logs.push('⚠ '+a.join(' ')), error: (...a) => logs.push('✗ '+a.join(' ')) });
      logs.forEach(l => consolePrint(l));
      consolePrint('');
      consolePrint('Result (first 5 cols):');
      testDefs.slice(0,5).forEach((d,i) => {
        consolePrint(`  [${i}] "${d.srcCol}" → "${d.outName}"  transform:${d.transform}  dropped:${d.dropped}`);
      });
      consolePrint('✓ Test complete — click Apply to update mapping table.');
    } else {
      // Row mode: run on first 3 rows
      const sample = rawData.slice(0,3);
      const helpers = rowScriptHelpers();
      const fn = new Function(...Object.keys(helpers), 'transformRow', '"use strict"; return transformRow;');
      const userFn = extractTransformRow(code);
      const bound = fn(...Object.values(helpers), userFn);
      sample.forEach((row, i) => {
        const result = bound(row);
        consolePrint(`Row ${i+1}: ${result === null ? '⛔ DROPPED' : JSON.stringify(result).slice(0,120)}`);
      });
      consolePrint('✓ Test complete — click Apply to activate for export.');
    }
  } catch(err) {
    consolePrint('✗ Error: '+err.message, true);
    console.error(err);
  }
}

// ── Apply script ────────────────────────────────────
function applyScript(){
  consoleClear();
  const code = document.getElementById('scriptEditor').value;
  if(!code.trim()){ consolePrint('Nothing to apply.'); return; }
  try {
    if(scriptMode === 'column'){
      const fn = new Function('colDefs','srcHeaders','console2', '"use strict";\n'+code);
      fn(colDefs, srcHeaders, { log: (...a) => consolePrint(a.join(' ')), warn: (...a) => consolePrint('⚠ '+a.join(' ')), error: (...a) => consolePrint('✗ '+a.join(' '), true) });
      renderColTable();
      consolePrint('✓ Column mapping updated.');
      closeScriptEditor();
    } else {
      // Store the row script for use in applyRules
      activeRowScript = code;
      consolePrint('✓ Row script saved — will run on every row during Preview & Export.');
      closeScriptEditor();
    }
  } catch(err) {
    consolePrint('✗ Error: '+err.message, true);
    console.error(err);
  }
}

// ── Row script helpers available inside user script ─
function rowScriptHelpers(){
  return {
    trim:    s => String(s??'').trim(),
    upper:   s => String(s??'').toUpperCase(),
    lower:   s => String(s??'').toLowerCase(),
    left:    (s,n) => String(s??'').slice(0,n),
    right:   (s,n) => String(s??'').slice(-n),
    isBlank: v => v===null||v===undefined||String(v).trim()==='',
    num:     v => { const n=parseFloat(String(v??'').replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; },
    toDate:  v => { if(!v&&v!==0)return null; if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return isNaN(d.getTime())?null:d;} const d=new Date(v);return isNaN(d.getTime())?null:d; },
    fmtDate: (v,fmt) => {
      const d = (() => { if(!v&&v!==0)return null; if(typeof v==='number'){const dd=new Date(Math.round((v-25569)*86400*1000));return isNaN(dd.getTime())?null:dd;} const dd=new Date(v);return isNaN(dd.getTime())?null:dd; })();
      if(!d) return String(v??'');
      const Y=d.getFullYear(), M=String(d.getMonth()+1).padStart(2,'0'), D=String(d.getDate()).padStart(2,'0');
      if(fmt==='YYYYMMDD') return `${Y}${M}${D}`;
      if(fmt==='YYYY-MM-DD') return `${Y}-${M}-${D}`;
      if(fmt==='MM/DD/YYYY') return `${M}/${D}/${Y}`;
      if(fmt==='P_YYYYMMDD') return `P_${Y}${M}${D}`;
      return `${Y}-${M}-${D}`;
    },
  };
}

// Extract the transformRow function from user code safely
function extractTransformRow(code){
  const helpers = rowScriptHelpers();
  const fn = new Function(...Object.keys(helpers), '"use strict";\n'+code+'\nreturn typeof transformRow !== "undefined" ? transformRow : null;');
  const result = fn(...Object.values(helpers));
  if(typeof result !== 'function') throw new Error('transformRow function not found in script');
  return result;
}

// Active row script (null = none)
let activeRowScript = null;

// Tab key support in editor
document.getElementById('scriptEditor').addEventListener('keydown', function(e){
  if(e.key === 'Tab'){
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.slice(0,s) + '  ' + this.value.slice(end);
    this.selectionStart = this.selectionEnd = s+2;
  }
  if(e.key === 'Escape') closeScriptEditor();
});

// Close on backdrop click
document.getElementById('scriptModal').addEventListener('click', function(e){
  if(e.target === this) closeScriptEditor();
});
</script>

<script>
// ── Patch applyRules to run activeRowScript when set ──
const _origApplyRules = applyRules;
applyRules = function(data){
  let result = _origApplyRules(data);
  if(activeRowScript){
    try {
      const helpers = rowScriptHelpers();
      const userFn = extractTransformRow(activeRowScript);
      const bound = new Function(...Object.keys(helpers), 'transformRow', '"use strict"; return transformRow;')(...Object.values(helpers), userFn);
      result = result.map(row => bound(row)).filter(r => r !== null && r !== false && r !== undefined);
    } catch(err){
      console.error('Row script error:', err);
      alert('Row script error:\n'+err.message);
    }
  }
  return result;
};
</script>
